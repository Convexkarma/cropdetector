<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FarmGuard AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
    .glass { background: rgba(255, 255, 255, 0.95); border: 1px solid rgba(255,255,255,0.4); }
    
    /* Voice Waveform */
    .waveform { display: flex; align-items: center; justify-content: center; gap: 4px; height: 24px; }
    .waveform span { width: 4px; height: 10px; background: white; border-radius: 2px; animation: wave 1s infinite ease-in-out; }
    .waveform span:nth-child(2) { animation-delay: 0.1s; }
    .waveform span:nth-child(3) { animation-delay: 0.2s; }
    @keyframes wave { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(2.5); } }
    
    /* Loader */
    .loader { border: 4px solid #f3f4f6; border-top: 4px solid #10b981; border-radius: 50%; width: 48px; height: 48px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    /* Progress Circle */
    .circular-chart { display: block; margin: 0 auto; max-width: 80%; max-height: 250px; }
    .circle-bg { fill: none; stroke: #f1f5f9; stroke-width: 3.8; }
    .circle { fill: none; stroke-width: 2.8; stroke-linecap: round; transition: stroke-dasharray 1.5s ease-out; }
    .percentage { fill: #1e293b; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.5em; text-anchor: middle; font-weight: 800;}
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const TRANSLATIONS = {
      en: {
        title: "FarmGuard AI",
        crop: "Crop", season: "Season", upload: "Upload Crop Image",
        listening: "Listening...", voiceText: "Use Voice",
        analyze: "Analyze Crop",
        detected: "Detected", action: "Action Plan", cost: "Cost", loss: "Loss if untreated",
        netBenefit: "Net Benefit", share: "Share to WhatsApp",
        history: "Historical Scan Log", healthy: "Healthy", chemical: "Chemical", organic: "Organic",
        urgency: "Act within 24 hours", resources: "Nearby Resources",
        chatHint: "Ask a farming question..."
      },
      sw: {
        title: "FarmGuard AI",
        crop: "Zao", season: "Msimu", upload: "Pakia Picha ya Zao",
        listening: "Inasikiliza...", voiceText: "Tumia Sauti",
        analyze: "Changanua Zao",
        detected: "Imezinduliwa", action: "Kitendo", cost: "Gharama", loss: "Hasara",
        netBenefit: "Faida Halisi", share: "Shiriki WhatsApp",
        history: "Kumbukumbu", healthy: "Mzima", chemical: "Kemikali", organic: "Kikaboni",
        urgency: "Chukua hatua ndani ya saa 24", resources: "Rasilimali za Karibu",
        chatHint: "Uliza swali la kilimo..."
      }
    };

    // Icons
    const Icons = {
      Mic: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" /></svg>,
      Chat: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg>,
      Close: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>,
      Phone: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>,
      Map: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>,
      Share: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" /></svg>,
      Alert: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
    };

    function App() {
      const [lang, setLang] = useState('en');
      const t = TRANSLATIONS[lang];
      const [step, setStep] = useState(1);
      
      const [crop, setCrop] = useState('Maize');
      const [season, setSeason] = useState('Growing');
      
      const [image, setImage] = useState(null);
      const [isListening, setIsListening] = useState(false);
      const [isDragging, setIsDragging] = useState(false);
      const [history, setHistory] = useState(() => JSON.parse(localStorage.getItem('farmguard_history')) || [
        { date: '2 days ago', disease: 'Healthy', severity: 'Low', trend: 'up' },
        { date: '5 days ago', disease: 'Early Blight', severity: 'Medium', trend: 'down' }
      ]);
      const [results, setResults] = useState(null);
      
      const [treatmentType, setTreatmentType] = useState('chemical');
      const [tasks, setTasks] = useState([]);
      
      const [chatOpen, setChatOpen] = useState(false);
      const [chatMsgs, setChatMsgs] = useState([{role: 'bot', text: 'Habari! I am your FarmGuard AI Guide. Ask me "How do I use this site?" or "What does the action plan do?"'}]);
      const [chatInput, setChatInput] = useState('');

      const fileInputRef = useRef(null);

      useEffect(() => {
        localStorage.setItem('farmguard_history', JSON.stringify(history));
      }, [history]);

      const handleVoice = () => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          alert('Voice recognition not supported in your browser.');
          return;
        }
        const recognition = new SpeechRecognition();
        setIsListening(true);
        recognition.onresult = (event) => {
          const text = event.results[0][0].transcript.toLowerCase();
          setIsListening(false);
          if (text.includes('maize') || text.includes('disease') || text.includes('leaf')) {
            setImage('https://images.unsplash.com/photo-1595841696677-6489ff3f8cd1?auto=format&fit=crop&w=400&q=80');
          }
        };
        recognition.onerror = () => setIsListening(false);
        recognition.start();
      };

      const startAnalysis = () => {
        setStep(2);
        setTimeout(() => {
          const mockData = {
            disease: "Maize Leaf Blight",
            confidence: 87,
            severity: "High",
            loss: 12000,
            marketPrice: 50,
            treatments: {
              chemical: { cost: 2000, effect: 95, time: '24hrs', name: 'Mancozeb Fungicide', desc: 'Recommendation: Chemical for High Severity' },
              organic: { cost: 800, effect: 70, time: '72hrs', name: 'Neem Oil Extract', desc: 'Recommendation: Better for prevention' }
            }
          };
          setResults(mockData);
          setTasks([
            { id: 1, text: `NOW: Apply fungicide (KES ${mockData.treatments.chemical.cost.toLocaleString()})`, done: false },
            { id: 2, text: '24 HRS: Remove infected leaves', done: false },
            { id: 3, text: '48 HRS: Monitor new growth', done: false },
            { id: 4, text: '7 DAYS: Follow-up treatment', done: false }
          ]);
          setHistory(prev => [{
            date: 'Today',
            disease: mockData.disease,
            severity: mockData.severity,
            trend: 'down'
          }, ...prev].slice(0, 3));
          setTreatmentType('chemical');
          setStep(3);
        }, 1500);
      };

      const shareReport = () => {
        const text = `FarmGuard AI Report: ${results.disease} detected (${results.confidence}% confidence). Action: Apply fungicide within 24hrs. Loss if untreated: KES ${results.loss.toLocaleString()}. Treatment cost: KES ${results.treatments.chemical.cost.toLocaleString()}. Net savings: KES ${(results.loss - results.treatments.chemical.cost).toLocaleString()}. Market price: KES ${results.marketPrice}/kg.`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
      };

      const handleChat = (e) => {
        e.preventDefault();
        if(!chatInput.trim()) return;
        const userInput = chatInput.trim();
        setChatMsgs(prev => [...prev, {role: 'user', text: userInput}]);
        setChatInput('');
        
        setTimeout(() => {
          let reply = "I'm here to help! To use this site: 1. Select your crop and season. 2. Tap the camera icon or drag a photo of your crop's leaf to upload it. 3. Click 'Analyze Crop' to get an AI diagnosis, treatment plan, and cost analysis.";
          const lowerInput = userInput.toLowerCase();
          
          if (lowerInput.includes('action plan') || lowerInput.includes('task')) {
            reply = "The Action Plan gives you a step-by-step timeline (e.g., NOW, 24 HRS, 7 DAYS) to treat your crop. You can check off tasks as you complete them to track your progress!";
          } else if (lowerInput.includes('harvest') || lowerInput.includes('disease')) {
            reply = "Based on your disease detection, apply fungicide today. Next: remove infected leaves in 24 hours. Market prices are KES 50/kg - harvest in 2 weeks for best prices.";
          } else if (lowerInput.includes('voice')) {
            reply = "Click the 'Use Voice' button and simply say 'maize leaf disease' to automatically load a sample image for analysis.";
          }
          
          setChatMsgs(prev => [...prev, {role: 'bot', text: reply}]);
        }, 800);
      };

      const renderConfidence = (conf) => {
        let color = '#10b981'; // 0-50 (Wait, prompt says: 0-50% Orange, 51-75% Yellow, 76-100% Red)
        if(conf > 75) color = '#ef4444'; // Red
        else if(conf > 50) color = '#eab308'; // Yellow
        else color = '#f97316'; // Orange

        const dashArray = `${conf}, 100`;

        return (
          <div className="w-40 h-40 mx-auto relative flex items-center justify-center">
             <svg viewBox="0 0 36 36" className="circular-chart w-full h-full absolute inset-0">
              <path className="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
              <path className="circle" strokeDasharray={dashArray} stroke={color} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
            </svg>
            <div className="text-center z-10">
              <div className="text-3xl font-black text-slate-800 leading-none">{conf}%</div>
              <div className="text-[10px] uppercase font-bold text-slate-500 tracking-wider">Confidence</div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen pb-20 md:pb-8">
          {/* Top Bar */}
          <header className="bg-white shadow-sm p-4 sticky top-0 z-30 flex justify-between items-center border-b border-slate-200">
            <h1 className="text-2xl font-extrabold text-emerald-600 tracking-tight">🌱 FarmGuard AI</h1>
            <button onClick={() => setLang(lang === 'en' ? 'sw' : 'en')} className="px-4 py-1.5 rounded-full border-2 border-emerald-100 text-emerald-700 text-sm font-bold hover:bg-emerald-50 transition-colors">
              {lang === 'en' ? 'SWAHILI' : 'ENGLISH'}
            </button>
          </header>

          <main className="max-w-6xl mx-auto p-4 md:p-6 grid grid-cols-1 md:grid-cols-12 gap-6">
            
            {/* Left Sidebar: History */}
            <div className="hidden md:block md:col-span-3">
              <div className="glass rounded-2xl p-5 sticky top-24 shadow-sm">
                <h3 className="font-bold text-slate-800 mb-4 text-lg">{t.history}</h3>
                {history.length === 0 ? <p className="text-sm text-slate-500">No recent scans.</p> : (
                  <div className="space-y-4 relative before:absolute before:inset-0 before:ml-2 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-200 before:to-transparent">
                    {history.map((h, i) => (
                      <div key={i} className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group is-active">
                        <div className={`flex items-center justify-center w-4 h-4 rounded-full border-2 border-white text-white shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 ${h.trend === 'down' ? 'bg-red-500' : 'bg-emerald-500'}`}></div>
                        <div className="w-[calc(100%-2rem)] md:w-[calc(50%-2.5rem)] p-3 rounded-xl border border-slate-100 bg-white shadow-sm">
                          <div className="font-bold text-slate-800 text-sm mb-1">{h.disease}</div>
                          <div className="text-slate-500 text-xs font-medium flex items-center gap-1">
                            {h.trend === 'down' ? <span className="text-red-500 font-bold">↓ Worsening</span> : <span className="text-emerald-500 font-bold">↑ Improving</span>}
                          </div>
                          <div className="text-slate-400 text-[10px] mt-1 uppercase tracking-wider">{h.date}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>

            {/* Main Content Area */}
            <div className="md:col-span-6 space-y-6">
              
              {/* Step 1: Upload */}
              {step === 1 && (
                <div className="glass rounded-3xl p-6 md:p-8 shadow-md border border-white">
                  <h2 className="text-2xl font-extrabold text-slate-800 mb-6">{t.upload}</h2>
                  
                  <div className="grid grid-cols-2 gap-4 mb-6">
                    <div>
                      <label className="block text-sm font-bold text-slate-600 mb-2">{t.crop}</label>
                      <select value={crop} onChange={e=>setCrop(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-medium focus:ring-2 focus:ring-emerald-500 focus:outline-none appearance-none">
                        <option>Maize</option><option>Wheat</option><option>Cassava</option><option>Tomato</option><option>Coffee</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-slate-600 mb-2">{t.season}</label>
                      <select value={season} onChange={e=>setSeason(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-medium focus:ring-2 focus:ring-emerald-500 focus:outline-none appearance-none">
                        <option>Planting</option><option>Growing</option><option>Harvesting</option><option>Rainy</option><option>Dry</option>
                      </select>
                    </div>
                  </div>

                  <div 
                    className={`border-2 border-dashed rounded-2xl p-10 text-center cursor-pointer transition-colors group ${isDragging ? 'border-emerald-500 bg-emerald-100 scale-[1.02]' : 'border-emerald-200 bg-emerald-50/30 hover:bg-emerald-50'}`}
                    onClick={() => fileInputRef.current?.click()}
                    onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
                    onDragLeave={() => setIsDragging(false)}
                    onDrop={(e) => {
                      e.preventDefault();
                      setIsDragging(false);
                      if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                        setImage(URL.createObjectURL(e.dataTransfer.files[0]));
                      }
                    }}
                  >
                    {image ? (
                      <img src={image} alt="Crop" className="mx-auto max-h-56 rounded-xl object-cover shadow-sm" />
                    ) : (
                      <div>
                        <div className="text-5xl mb-3 transform group-hover:scale-110 transition-transform">📸</div>
                        <p className="text-slate-500 font-bold">Tap or drag photo here</p>
                      </div>
                    )}
                    <input type="file" ref={fileInputRef} hidden accept="image/*" onChange={(e) => {
                      if(e.target.files[0]) setImage(URL.createObjectURL(e.target.files[0]));
                    }} />
                  </div>

                  <div className="mt-6 flex flex-col sm:flex-row gap-4">
                    <button onClick={handleVoice} className={`flex-1 flex items-center justify-center gap-2 py-4 rounded-xl font-bold transition-all ${isListening ? 'bg-red-500 text-white shadow-lg shadow-red-200 scale-[1.02]' : 'bg-slate-100 text-slate-700 hover:bg-slate-200'}`}>
                      <Icons.Mic />
                      {isListening ? (
                        <div className="waveform"><span></span><span></span><span></span></div>
                      ) : t.voiceText}
                    </button>
                    {image && (
                      <button onClick={startAnalysis} className="flex-1 bg-emerald-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-emerald-200 hover:shadow-xl hover:-translate-y-0.5 transition-all">
                        {t.analyze}
                      </button>
                    )}
                  </div>
                </div>
              )}

              {/* Step 2: Analyzing */}
              {step === 2 && (
                <div className="glass rounded-3xl p-12 text-center shadow-md flex flex-col items-center justify-center min-h-[400px]">
                  <div className="loader mb-6"></div>
                  <h2 className="text-2xl font-extrabold text-slate-800 mb-2">Analyzing {crop}...</h2>
                  <p className="text-slate-500 font-medium">Checking against 50+ known diseases</p>
                </div>
              )}

              {/* Step 3: Results */}
              {step === 3 && results && (
                <div className="space-y-6 animate-[fadeIn_0.5s_ease-out]">
                  
                  {/* 12. Urgency Banner */}
                  <div className="bg-red-500 text-white rounded-2xl p-4 flex items-center gap-4 shadow-lg shadow-red-200">
                    <div className="bg-white/20 p-2 rounded-full backdrop-blur-sm"><Icons.Alert /></div>
                    <div className="flex-1">
                      <div className="font-extrabold text-lg tracking-wide uppercase">{t.urgency}</div>
                      <div className="text-red-100 font-medium opacity-90 text-sm">Critical {results.disease} detected. Immediate action required.</div>
                    </div>
                  </div>

                  {/* Top Card: Detection & Confidence */}
                  <div className="glass rounded-3xl p-6 md:p-8 shadow-sm flex flex-col sm:flex-row items-center gap-8">
                    <div className="w-full sm:w-1/3 shrink-0">
                      {renderConfidence(results.confidence)}
                    </div>
                    <div className="w-full sm:w-2/3 text-center sm:text-left">
                      <div className="inline-block px-3 py-1 bg-red-100 text-red-700 rounded-lg text-xs font-black uppercase tracking-widest mb-3">High Severity</div>
                      <h2 className="text-3xl font-extrabold text-slate-900 mb-2">{results.disease}</h2>
                      <p className="text-slate-500 font-medium mb-6">{t.detected} in {crop} ({season} season)</p>
                      <button onClick={shareReport} className="flex items-center justify-center sm:justify-start gap-2 text-white font-bold bg-[#25D366] hover:bg-[#128C7E] px-6 py-3 rounded-xl w-full sm:w-auto transition-colors shadow-md shadow-green-200">
                        <Icons.Share /> {t.share}
                      </button>
                    </div>
                  </div>

                  {/* Net Benefit Calculator */}
                  <div className="glass rounded-3xl p-6 md:p-8 shadow-sm relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-2 h-full bg-emerald-500"></div>
                    <h3 className="font-extrabold text-slate-800 mb-6 text-xl">{t.netBenefit}</h3>
                    <div className="grid grid-cols-3 gap-2 md:gap-4 text-center items-center">
                      <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <div className="text-[10px] md:text-xs text-slate-500 uppercase font-bold tracking-wider mb-2">Gain (If Treated)</div>
                        <div className="font-black text-emerald-600 text-sm md:text-xl">KES {results.loss.toLocaleString()}</div>
                      </div>
                      <div className="font-black text-slate-300 text-2xl">-</div>
                      <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <div className="text-[10px] md:text-xs text-slate-500 uppercase font-bold tracking-wider mb-2">{t.cost}</div>
                        <div className="font-black text-red-500 text-sm md:text-xl">KES {results.treatments[treatmentType].cost.toLocaleString()}</div>
                      </div>
                    </div>
                    <div className="mt-6 bg-emerald-500 text-white p-4 rounded-2xl text-center font-black text-2xl shadow-lg shadow-emerald-200">
                      = +KES {(results.loss - results.treatments[treatmentType].cost).toLocaleString()}
                    </div>
                  </div>

                  {/* Treatment Comparison */}
                  <div className="glass rounded-3xl p-6 md:p-8 shadow-sm">
                    <div className="flex justify-between items-center mb-6">
                      <h3 className="font-extrabold text-slate-800 text-xl">Treatment Options</h3>
                      <div className="flex bg-slate-100 rounded-xl p-1 border border-slate-200">
                        <button onClick={()=>setTreatmentType('chemical')} className={`px-4 py-1.5 text-sm rounded-lg font-bold transition-all ${treatmentType === 'chemical' ? 'bg-white shadow text-emerald-700' : 'text-slate-500 hover:text-slate-700'}`}>{t.chemical}</button>
                        <button onClick={()=>setTreatmentType('organic')} className={`px-4 py-1.5 text-sm rounded-lg font-bold transition-all ${treatmentType === 'organic' ? 'bg-white shadow text-emerald-700' : 'text-slate-500 hover:text-slate-700'}`}>{t.organic}</button>
                      </div>
                    </div>
                    
                    <div className="bg-white border-2 border-slate-100 rounded-2xl p-5">
                      <div className="flex justify-between items-start mb-3">
                        <div>
                          <div className="font-black text-xl text-slate-900 mb-1">{results.treatments[treatmentType].name}</div>
                          <div className="text-sm font-medium text-slate-500 bg-slate-100 inline-block px-2 py-1 rounded-md">Takes {results.treatments[treatmentType].time}</div>
                        </div>
                        <div className="text-right">
                          <div className="font-black text-3xl text-emerald-600">{results.treatments[treatmentType].effect}%</div>
                          <div className="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Effective</div>
                        </div>
                      </div>
                      <div className="mt-4 text-sm font-bold bg-blue-50 text-blue-700 p-3 rounded-xl border border-blue-100">
                        {results.treatments[treatmentType].desc}
                      </div>
                    </div>
                  </div>

                  {/* Action Timeline (Checkboxes) */}
                  <div className="glass rounded-3xl p-6 md:p-8 shadow-sm">
                    <h3 className="font-extrabold text-slate-800 mb-6 text-xl">{t.action}</h3>
                    <div className="space-y-3">
                      {tasks.map(task => (
                        <label key={task.id} className={`flex items-center gap-4 p-4 rounded-2xl cursor-pointer border-2 transition-all ${task.done ? 'bg-slate-50 border-slate-200 opacity-60' : 'bg-white border-emerald-100 shadow-sm hover:border-emerald-300'}`}>
                          <div className={`w-6 h-6 rounded flex items-center justify-center border-2 transition-colors shrink-0 ${task.done ? 'bg-emerald-500 border-emerald-500' : 'bg-white border-slate-300'}`}>
                            {task.done && <svg className="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>}
                          </div>
                          <span className={`font-bold ${task.done ? 'line-through text-slate-500' : 'text-slate-800'}`}>{task.text}</span>
                        </label>
                      ))}
                    </div>
                  </div>

                  <button onClick={() => {setStep(1); setImage(null);}} className="w-full py-4 bg-slate-800 text-white font-extrabold rounded-2xl hover:bg-slate-900 transition-colors shadow-lg shadow-slate-200">
                    Scan Another Crop
                  </button>

                </div>
              )}
            </div>

            {/* Right Sidebar: Resources */}
            <div className="hidden md:block md:col-span-3">
              <div className="glass rounded-2xl p-5 sticky top-24 shadow-sm">
                <h3 className="font-bold text-slate-800 mb-4 text-lg">{t.resources}</h3>
                <div className="space-y-4">
                  <div className="bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                    <div className="font-extrabold text-slate-800">Mavuno Agrovet</div>
                    <div className="text-xs font-medium text-slate-500 flex items-center gap-1 my-2"><Icons.Map /> 2.3 km away • <span className="text-emerald-600 font-bold bg-emerald-50 px-2 py-0.5 rounded">Open Now</span></div>
                    <div className="flex gap-2 mt-3">
                      <button className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs py-2 rounded-lg font-bold flex items-center justify-center gap-1 transition-colors"><Icons.Map /> Directions</button>
                      <button className="flex-1 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 text-xs py-2 rounded-lg font-bold flex items-center justify-center gap-1 transition-colors"><Icons.Phone /> Call</button>
                    </div>
                  </div>
                  <div className="bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                    <div className="font-extrabold text-slate-800">Gov. Extension Officer</div>
                    <div className="text-xs font-medium text-slate-500 flex items-center gap-1 my-2">Available Mon-Fri</div>
                    <button className="w-full mt-2 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 text-xs py-2 rounded-lg font-bold flex items-center justify-center gap-1 transition-colors"><Icons.Phone /> Call 0800...</button>
                  </div>
                  <div className="bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
                    <div className="font-extrabold text-slate-800">Farmers Cooperative</div>
                    <div className="text-xs font-medium text-slate-500 flex items-center gap-1 my-2"><Icons.Map /> 5 km away • Buyers Available</div>
                  </div>
                </div>
              </div>
            </div>

          </main>

          {/* Floating Chatbot */}
          <div className="fixed bottom-6 right-6 md:bottom-8 md:right-8 z-50">
            {chatOpen ? (
              <div className="bg-white rounded-2xl shadow-2xl shadow-emerald-900/20 w-[90vw] max-w-[380px] overflow-hidden flex flex-col border border-slate-200 animate-[fadeIn_0.2s_ease-out]">
                <div className="bg-slate-900 text-white p-4 flex justify-between items-center">
                  <div className="font-extrabold flex items-center gap-2 text-emerald-400"><Icons.Chat /> AI Assistant</div>
                  <button onClick={() => setChatOpen(false)} className="hover:bg-slate-800 p-1 rounded-lg transition-colors"><Icons.Close /></button>
                </div>
                <div className="h-[350px] overflow-y-auto p-4 bg-slate-50 space-y-4">
                  {chatMsgs.map((m, i) => (
                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                      <div className={`max-w-[85%] p-3 rounded-2xl text-sm font-medium ${m.role === 'user' ? 'bg-emerald-500 text-white rounded-tr-sm' : 'bg-white border border-slate-200 text-slate-700 rounded-tl-sm shadow-sm'}`}>
                        {m.text}
                      </div>
                    </div>
                  ))}
                </div>
                <form onSubmit={handleChat} className="p-3 bg-white border-t border-slate-200 flex gap-2">
                  <input value={chatInput} onChange={e=>setChatInput(e.target.value)} type="text" placeholder={t.chatHint} className="flex-1 p-3 bg-slate-100 rounded-xl text-sm font-medium focus:outline-none focus:ring-2 focus:ring-emerald-500" />
                  <button type="submit" disabled={!chatInput.trim()} className="bg-emerald-600 hover:bg-emerald-700 disabled:opacity-50 text-white px-4 py-3 rounded-xl font-bold text-sm transition-colors">Send</button>
                </form>
              </div>
            ) : (
              <button onClick={() => setChatOpen(true)} className="bg-slate-900 hover:bg-black text-emerald-400 w-16 h-16 rounded-full flex items-center justify-center shadow-xl shadow-slate-900/20 transition-transform hover:scale-105">
                <Icons.Chat />
              </button>
            )}
          </div>

          <style>{`
            @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
          `}</style>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
